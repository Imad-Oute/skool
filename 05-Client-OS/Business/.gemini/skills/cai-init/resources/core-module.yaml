code: core
name: "CAI Core Module"

header: "CAI Core Configuration"
subheader: "Configure the core settings for your CAI installation.\nThese settings will be used across all installed cai skills, workflows, and agents."

user_name:
  prompt: "What should agents call you? (Use your name or a team name)"
  default: "CAI"
  result: "{value}"

communication_language:
  prompt: "What language should agents use when chatting with you?"
  default: "English"
  result: "{value}"

document_output_language:
  prompt: "Preferred document output language?"
  default: "English"
  result: "{value}"

output_folder:
  prompt: "Where should output files be saved?"
  default: "_cai-output"
  result: "{project-root}/{value}"
